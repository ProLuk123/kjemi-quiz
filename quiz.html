<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kjemi 2 Quiz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { width: 100%; max-width: 750px; }
    h1 { text-align: center; font-size: 1.8rem; margin-bottom: 6px; color: #38bdf8; }
    .subtitle { text-align: center; color: #94a3b8; margin-bottom: 28px; font-size: 0.9rem; }
    .progress-bar { background: #1e293b; border-radius: 999px; height: 8px; margin-bottom: 6px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #38bdf8, #818cf8); border-radius: 999px; transition: width 0.4s ease; }
    .progress-text { display: flex; justify-content: space-between; font-size: 0.8rem; color: #64748b; margin-bottom: 20px; }
    .card { background: #1e293b; border-radius: 16px; padding: 28px; border: 1px solid #334155; }
    .tag-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .tag { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 10px; border-radius: 999px; }
    .tag-real { background: #1e3a5f; color: #38bdf8; border: 1px solid #38bdf8; }
    .tag-own { background: #1a3a1a; color: #4ade80; border: 1px solid #4ade80; }
    .tag-topic { background: #2d1b6e; color: #a78bfa; border: 1px solid #a78bfa; }
    .question { font-size: 1.05rem; line-height: 1.7; margin-bottom: 22px; color: #f1f5f9; white-space: pre-line; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option { background: #0f172a; border: 2px solid #334155; border-radius: 10px; padding: 13px 16px; cursor: pointer; transition: all 0.18s; font-size: 0.97rem; color: #e2e8f0; text-align: left; line-height: 1.5; }
    .option:hover:not(:disabled) { border-color: #38bdf8; background: #162032; }
    .option.correct { border-color: #22c55e !important; background: #14532d !important; color: #bbf7d0 !important; }
    .option.wrong { border-color: #ef4444 !important; background: #450a0a !important; color: #fecaca !important; }
    .option:disabled { cursor: default; }
    .feedback { margin-top: 18px; padding: 16px; border-radius: 10px; font-size: 0.93rem; line-height: 1.7; display: none; }
    .feedback.show { display: block; }
    .feedback.ok { background: #14532d; border: 1px solid #22c55e; color: #bbf7d0; }
    .feedback.no { background: #450a0a; border: 1px solid #ef4444; color: #fecaca; }
    .feedback strong { display: block; font-size: 1rem; margin-bottom: 8px; }
    .sol { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.15); }
    .sol-title { font-weight: 700; margin-bottom: 6px; color: #fbbf24; }
    .next-btn { margin-top: 16px; width: 100%; padding: 13px; background: linear-gradient(90deg, #38bdf8, #818cf8); border: none; border-radius: 10px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; display: none; transition: opacity 0.2s; }
    .next-btn:hover { opacity: 0.88; }
    .next-btn.show { display: block; }
    .results { text-align: center; display: none; }
    .results.show { display: block; }
    .score-circle { width: 130px; height: 130px; border-radius: 50%; background: linear-gradient(135deg, #38bdf8, #818cf8); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 2rem; font-weight: 700; }
    .results h2 { font-size: 1.5rem; margin-bottom: 10px; }
    .results > p { color: #94a3b8; margin-bottom: 24px; }
    .weak-box { background: #1e293b; border-radius: 12px; padding: 18px; text-align: left; margin-bottom: 20px; border: 1px solid #334155; }
    .weak-box h3 { color: #f59e0b; margin-bottom: 12px; font-size: 0.95rem; }
    .weak-box ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .weak-box li { color: #fcd34d; font-size: 0.88rem; padding: 6px 10px; background: #422006; border-radius: 6px; border-left: 3px solid #f59e0b; }
    .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .restart-btn { padding: 12px 32px; background: #1e293b; border: 2px solid #38bdf8; border-radius: 10px; color: #38bdf8; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .restart-btn:hover { background: #38bdf8; color: #0f172a; }
    .start-screen { text-align: center; }
    .start-screen p { color: #94a3b8; margin-bottom: 16px; line-height: 1.6; }
    .filter-section { margin-bottom: 20px; }
    .filter-label { color: #64748b; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
    .filter-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 8px; }
    .filter-btn { padding: 8px 20px; border-radius: 999px; border: 2px solid #334155; background: #1e293b; color: #94a3b8; cursor: pointer; font-size: 0.88rem; transition: all 0.2s; }
    .filter-btn.active { border-color: #38bdf8; background: #162032; color: #38bdf8; }
    .filter-btn.active-green { border-color: #4ade80; background: #162032; color: #4ade80; }
    .start-btn { padding: 14px 48px; background: linear-gradient(90deg, #38bdf8, #818cf8); border: none; border-radius: 10px; color: white; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; margin-top: 8px; }
    .start-btn:hover { opacity: 0.88; }
    .stats-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
    .stat { background: #1e293b; border-radius: 10px; padding: 12px 20px; border: 1px solid #334155; }
    .stat-num { font-size: 1.5rem; font-weight: 700; color: #38bdf8; }
    .stat-label { font-size: 0.75rem; color: #64748b; }
    .legend { display: flex; gap: 16px; justify-content: center; margin-bottom: 20px; font-size: 0.8rem; color: #94a3b8; }
    .legend span { display: flex; align-items: center; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-blue { background: #38bdf8; }
    .dot-green { background: #4ade80; }
  </style>
</head>
<body>
<div class="container">

  <!-- START -->
  <div id="start-screen" class="start-screen">
    <h1>⚗️ Kjemi 2 Quiz</h1>
    <p class="subtitle">Ekte tentamenoppgaver + egne øvingsoppgaver</p>
    <div class="stats-row">
      <div class="stat"><div class="stat-num" id="q-count">80</div><div class="stat-label">Spørsmål</div></div>
      <div class="stat"><div class="stat-num">10</div><div class="stat-label">Temaer</div></div>
    </div>
    <div class="legend">
      <span><div class="dot dot-blue"></div> Ekte tentamen</span>
      <span><div class="dot dot-green"></div> Øvingsoppgave</span>
    </div>
    <div class="filter-section">
      <div class="filter-label">Velg type</div>
      <div class="filter-row">
        <button class="filter-btn active" id="btn-real" onclick="toggleType('real',this)">Ekte tentamen</button>
        <button class="filter-btn active-green" id="btn-own" onclick="toggleType('own',this)">Øvingsoppgaver</button>
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-label">Velg tema</div>
      <div class="filter-row" id="topic-filters"></div>
    </div>
    <button class="start-btn" onclick="startQuiz()">Start quiz →</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz-screen" style="display:none">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-text">
      <span id="progress-text"></span>
      <span id="score-text"></span>
    </div>
    <div class="card">
      <div class="tag-row">
        <span class="tag" id="tag-type"></span>
        <span class="tag tag-topic" id="tag-topic"></span>
      </div>
      <div class="question" id="question"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="next-btn">Neste →</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="results" id="results-screen">
    <div class="score-circle" id="score-display"></div>
    <h2 id="results-title"></h2>
    <p id="results-msg"></p>
    <div class="weak-box" id="weak-box" style="display:none">
      <h3>⚠️ Repeter disse temaene:</h3>
      <ul id="weak-list"></ul>
    </div>
    <div class="btn-row">
      <button class="restart-btn" onclick="restartSame()">Ta igjen</button>
      <button class="restart-btn" onclick="backToStart()">Meny</button>
    </div>
  </div>

</div>
<script>
const Q = [
  // ===================== EKTE TENTAMEN =====================
  { type:'real', topic:'Likevekt',
    q:'En lukket beholder på 2 L tilføres 2 mol NOCl(g).\n2NOCl(g) ⇌ 2NO(g) + Cl₂(g),  K = 3,75·10⁻⁶ mol/L\nHvilken påstand stemmer?',
    o:['Ved likevekt er det mer produkter enn reaktanter.','Ved likevekt er [NO] større enn [Cl₂].','Dette er en heterogen likevekt.','Likevekten forskyves til høyre hvis volumet minker til 1 L.'],
    c:1, s:'K er svært liten → mest reaktanter. Av det lille som dannes er forholdet 2NO:1Cl₂ → [NO] > [Cl₂]. Volum-minkning forskyver til høyre for netto gassøkning (2→3 mol gass), men K er så liten at det uansett er mest reaktanter.' },

  { type:'real', topic:'Syrer og baser',
    q:'En liter 0,5 mol/L eddiksyre ble tilsatt 0,25 mol NaOH. Hvilket utsagn er IKKE riktig?',
    o:['Det er 0,25 mol OH⁻ i løsningen etter blandingen.','Det ble dannet 0,25 mol vann.','Konsentrasjonen av Na⁺ er 0,25 mol/L.','Løsningen har pH ≈ 4,7.'],
    c:0, s:'A er feil: OH⁻ reagerer fullstendig med eddiksyre (CH₃COOH + OH⁻ → CH₃COO⁻ + H₂O). Ingen OH⁻ gjenstår. Resultatet er en buffer med lik mengde syre og base → pH = pKa ≈ 4,7.' },

  { type:'real', topic:'Løselighet / Ksp',
    q:'Løseligheten til jern(III)hydroksid er høyere…',
    o:['enn løseligheten til jern(II)hydroksid','i en basisk løsning enn i vann','i HCl enn i vann','i Fe(NO₃)₃(aq) enn i vann'],
    c:2, s:'I HCl reagerer H⁺ med OH⁻: Fe(OH)₃ + 3H⁺ → Fe³⁺ + 3H₂O. Likevekten forskyves mot høyre → mer løser seg. I basisk løsning felles mer ut. Fe(NO₃)₃ gir fellesioneffekt (Fe³⁺) → lavere løselighet.' },

  { type:'real', topic:'Kromatografi',
    q:'Separasjon av heksan-1-ol og oktan-1-ol på TLC-plate med polar stasjonærfase og heptan som løpemiddel. Hva er riktig?',
    o:['Heksan-1-ol danner i mindre grad bindinger til stasjonærfasen enn oktan-1-ol.','Oktan-1-ol vil ha lavest Rf-verdi.','Oktan-1-ol har høyere løselighet i heptan enn heksan-1-ol.','Heksan-1-ol vil vandre lengst på platen.'],
    c:2, s:'Oktan-1-ol har lengre karbonkjede → mer upolar → bedre løselig i upolar heptan → vandrer lenger opp → høyere Rf. Heksan-1-ol er mer polar → sterkere binding til polar stasjonærfase → lavere Rf.' },

  { type:'real', topic:'Elektrokjemi',
    q:'Hvilken blanding vil reagere spontant?',
    o:['ZnSO₄(aq) og Cu(s)','Zn(s) og AgNO₃(aq)','MgSO₄(aq) og Fe(s)','Ag(s) og CuSO₄(aq)'],
    c:1, s:'Zn er mer reaktivt enn Ag (høyere i aktivitetsrekken). Zn(s) + 2Ag⁺(aq) → Zn²⁺(aq) + 2Ag(s). E° = E°Ag - E°Zn = 0,80 - (-0,76) = +1,56 V > 0 → spontan.' },

  { type:'real', topic:'Oksidasjonstall',
    q:'I hvilken forbindelse har klor lavest oksidasjonstall?',
    o:['HCl','Cl₂','HClO₃','ClF'],
    c:0, s:'HCl: Cl = -1 (lavest mulig). Cl₂: Cl = 0. HClO₃: Cl = +5. ClF: F er alltid -1, Cl = +1.' },

  { type:'real', topic:'Organisk kjemi',
    q:'14 g eten og 71 g klorgass reagerer. Utbytte 80 %. Hva dannes?',
    o:['26 g kloretan','40 g 1,2-dikloretan','52 g kloretan','79 g 1,2-dikloretan'],
    c:1, s:'Addisjonsreaksjon: C₂H₄ + Cl₂ → C₂H₄Cl₂ (1,2-dikloretan). Mol eten = 14/28 = 0,5 mol (begrensende). Teoretisk: 0,5 × 99 = 49,5 g. Med 80%: ≈ 40 g.' },

  { type:'real', topic:'Galvanisk celle',
    q:'Hva er riktig om en galvanisk celle som leverer strøm?',
    o:['Ved anoden skjer reduksjon.','Saltbroen fører elektroner fra katode til anode.','Katoden er den negative elektroden.','Elektroner vandrer i ytre leder fra anode til katode.'],
    c:3, s:'D: Elektroner går fra anode (negativ, oksidasjon) gjennom ytre leder til katode (positiv, reduksjon). Saltbroen fører ioner (ikke elektroner). Anode = oksidasjon, ikke reduksjon.' },

  { type:'real', topic:'Elektrolyse',
    q:'2Al₂O₃(l) + 3C(s) → 4Al(l) + 3CO₂(g). Hva er riktig om produksjonen?',
    o:['Reaksjonen er eksoterm.','Atomeffektiviteten er under 50 %.','Aluminium dannes på anoden.','Det går 2 mol e⁻ for å danne 27 g Al.'],
    c:1, s:'Atomeffektivitet = 4×27/(4×27+3×44) = 108/240 = 45% < 50%. Elektrolyse er endoterm. Al dannes på katoden (reduksjon: Al³⁺ + 3e⁻ → Al). 1 mol Al (27g) krever 3 mol e⁻.' },

  { type:'real', topic:'Entropi',
    q:'I hvilken prosess øker entropien?',
    o:['2ZnS(s) + 3O₂(g) → 2ZnO(s) + 2SO₂(g)','CH₂=CH₂(g) + H₂O(g) → CH₃CH₂OH(g)','2NO(g) → N₂(g) + O₂(g)','H₂O(s) → H₂O(l)'],
    c:3, s:'D: Is smelter → mer uorden → økt entropi. A: 3 mol gass → 2 mol gass = minker. B: 2 mol gass → 1 mol gass = minker. C: 2 mol gass → 2 mol gass, men N₂ og O₂ er enklere molekyler, liten endring.' },

  { type:'real', topic:'Reaksjonstyper',
    q:'Hvilken reaksjonstype skjer når aminosyrer kobles til protein?',
    o:['Addisjonsreaksjon','Kondensasjonsreaksjon','Redoksreaksjon','Hydrolysereaksjon'],
    c:1, s:'Kondensasjon: to molekyler kobles + vann frigjøres. Peptidbinding dannes mellom -COOH og -NH₂ med fjerning av H₂O. Hydrolyse er det motsatte (bryter ned proteinet).' },

  { type:'real', topic:'Buffer',
    q:'Hvilket stoff er best egnet som basisk komponent i en buffer med pH = 4,7?',
    o:['Hydrogensitrat','Eddiksyre','Hydrogentartrat','Dihydrogensitrat'],
    c:0, s:'pH ≈ pKa. Sitronsyre har pKa₂ ≈ 4,8. Bufferparet: Dihydrogensitrat (syre) / Hydrogensitrat (basisk komponent = konjugert base). Eddiksyre og Dihydrogensitrat er syrer.' },

  { type:'real', topic:'Syrer og baser',
    q:'Hvilket salt gir basisk løsning i vann?',
    o:['CaCl₂','K₂HPO₄','Na₂SO₄','Fe(NO₃)₃'],
    c:1, s:'K₂HPO₄: HPO₄²⁻ er konjugert base av svak syre → hydrolyse → basisk. CaCl₂ og Na₂SO₄: sterk+sterk = nøytral. Fe(NO₃)₃: Fe³⁺ hydrolyserer til sur løsning.' },

  { type:'real', topic:'Oksidasjonstall',
    q:'I hvilke to forbindelser har svovel samme oksidasjonstall?',
    o:['SF₆ og Na₂SO₄','S₈ og NaHSO₃','SO₂ og H₂SO₄','H₂S og SO₃'],
    c:0, s:'SF₆: S = +6 (F alltid -1). Na₂SO₄: SO₄²⁻, S = +6. Begge +6! S₈: S=0. NaHSO₃: S=+4. SO₂: S=+4. H₂SO₄: S=+6. H₂S: S=-2. SO₃: S=+6.' },

  { type:'real', topic:'Elektrolyse',
    q:'Hva dannes på anoden ved elektrolyse av Na₂SO₄(aq)?',
    o:['Na(s)','S₈(g)','H₂(g)','O₂(g)'],
    c:3, s:'Anode = oksidasjon. Vann oksideres lettere enn SO₄²⁻: 2H₂O → O₂ + 4H⁺ + 4e⁻. Na dannes aldri fra vandig løsning. H₂ dannes på katoden.' },

  { type:'real', topic:'Organisk kjemi',
    q:'32 g metanol og 30 g etansyre kondensasjonsreaksjon, 40 % utbytte. Hva dannes?',
    o:['30 g etylmetanat','15 g metyletanat','30 g metyletanat','15 g etylmetanat'],
    c:1, s:'CH₃OH + CH₃COOH → metyletanat + H₂O. Mol etansyre = 30/60 = 0,5 mol (begrensende). Teoretisk: 0,5×74 = 37 g. Med 40%: ≈15 g metyletanat.' },

  { type:'real', topic:'Galvanisk celle',
    q:'Galvanisk celle med Cu og Ag. Hva er riktig?',
    o:['Reduksjon av Cu²⁺ skjer.','Cellepotensialet er 1,14 V.','Cellen kan ikke levere strøm.','Elektroner vandrer fra Cu til Ag i ytre leder.'],
    c:3, s:'Cu er mer reaktivt enn Ag → Cu oksideres (anode), Ag⁺ reduseres (katode). Elektroner: Cu→Ag. E° = 0,80-0,34 = 0,46 V (ikke 1,14). Reaksjonen er spontan.' },

  { type:'real', topic:'Buffer',
    q:'0,50 mol KOH tilsettes 1,0 L eddiksyreløsning → buffer dannes. Hva var [eddiksyre]?',
    o:['0,05 mol/L','0,25 mol/L','0,50 mol/L','0,75 mol/L'],
    c:3, s:'For buffer trengs CH₃COOH og CH₃COO⁻. 0,50 mol KOH forbruker 0,50 mol syre. For at noe syre gjenstår må c > 0,50 mol/L. Med 0,75 mol/L: 0,25 mol syre igjen + 0,50 mol acetat → buffer.' },

  { type:'real', topic:'Buffer',
    q:'Hvilke to stoffer kan vi blande og få en buffer?',
    o:['NaOH og CH₃COONa','HCl og CH₃COONa','CH₃COOH og NH₃','HNO₃ og NaNO₃'],
    c:1, s:'HCl + CH₃COONa → CH₃COOH + NaCl. Nå har du CH₃COONa (base) og CH₃COOH (syre) = bufferpar! NaOH+acetat = bare base. CH₃COOH+NH₃ er ikke et konjugert par. HNO₃+NaNO₃ = sterk syre, ingen buffer.' },

  { type:'real', topic:'Elektrolyse',
    q:'Halvreaksjon for reduksjon ved elektrolyse av Na₂SO₄(aq)?',
    o:['Na⁺ + e⁻ → Na','2H⁺ + 2e⁻ → H₂','2H₂O → O₂ + 4H⁺ + 4e⁻','S + 2e⁻ → S²⁻'],
    c:1, s:'Katode = reduksjon. Vann (H⁺) reduseres i vandig løsning: 2H⁺ + 2e⁻ → H₂. Na⁺ reduseres ikke fra vandig løsning. C er oksidasjon (anode).' },

  { type:'real', topic:'Entropi',
    q:'Hvilket stoff har lavest entropi?',
    o:['H₂O(s)','H₂O(l)','N₂(g)','H₂O(g)'],
    c:0, s:'S(fast) < S(flytende) < S(gass). Is er mest ordnet → lavest entropi.' },

  { type:'real', topic:'Elektrokjemi',
    q:'Hva reagerer spontant i en løsning med Cu²⁺-ioner?',
    o:['Ag(s)','Au(s)','Zn²⁺(aq)','Fe(s)'],
    c:3, s:'Fe er mer reaktivt enn Cu: Fe(s) + Cu²⁺(aq) → Fe²⁺(aq) + Cu(s). E° = 0,34-(-0,44) = +0,78 V > 0 → spontan. Ag og Au er mindre reaktive enn Cu.' },

  { type:'real', topic:'Reaksjonstyper',
    q:'Etanol og propansyre reagerer i ett trinn. Hva er organisk produkt?',
    o:['Propyletanat','Etylpropyleter','Propyletyleter','Etylpropanat'],
    c:3, s:'Kondensasjonsreaksjon (esterifisering): etanol + propansyre → etylpropanat + vann. Alkoholdelen navngis først (etyl), så syre-delen (propanoat).' },

  { type:'real', topic:'Organisk kjemi',
    q:'Enzymet i en enzymkatalysert reaksjon — hva er riktig?',
    o:['Enzymet øker reaksjonsfarten.','Enzymet forskyver likevekten mot produktsiden.','Enzymet brukes opp i reaksjonen.','Enzymet øker aktiveringsenergien.'],
    c:0, s:'Enzymer er biologiske katalysatorer: senker aktiveringsenergien → øker farten. De forskyver IKKE likevekten, gjenvinnes (ikke forbrukt), og øker IKKE aktiveringsenergien.' },

  // ===================== EGNE ØVINGSOPPGAVER =====================
  { type:'own', topic:'Galvanisk celle',
    q:'I en galvanisk celle med Zn og Cu elektroder — hva skjer?',
    o:['Zn oksideres på katoden','Cu oksideres på anoden','Zn oksideres på anoden','Cu reduseres på anoden'],
    c:2, s:'Zn er mer reaktivt (høyere oppe i aktivitetsrekken). Zn oksideres = anode. Cu²⁺ reduseres = katode. Elektroner vandrer fra Zn-elektroden (anode) til Cu-elektroden (katode).' },

  { type:'own', topic:'Galvanisk celle',
    q:'Hva er cellepotensialet for en Zn/Cu celle?\nE°(Zn²⁺/Zn) = -0,76 V,  E°(Cu²⁺/Cu) = +0,34 V',
    o:['−1,10 V','0,42 V','1,10 V','−0,42 V'],
    c:2, s:'E°celle = E°katode − E°anode = 0,34 − (−0,76) = 1,10 V. Positivt svar bekrefter at reaksjonen er spontan (galvanisk celle).' },

  { type:'own', topic:'Elektrolyse',
    q:'Ved elektrolyse av smeltet NaCl (ikke vandig løsning) — hva dannes på katoden?',
    o:['Cl₂(g)','Na(l)','H₂(g)','O₂(g)'],

const TOPICS = [...new Set(Q.map(q=>q.topic))].sort();
let activeTypes = new Set(['real','own']);
let activeTopics = new Set(TOPICS);
let filtered=[], current=0, score=0, answered=false, wrongTopics={};

// Build topic filter buttons
const tf = document.getElementById('topic-filters');
TOPICS.forEach(t=>{
  const b = document.createElement('button');
  b.className='filter-btn active';
  b.textContent=t;
  b.onclick=()=>toggleTopic(t,b);
  tf.appendChild(b);
});

function updateCount(){
  const n = Q.filter(q=>activeTypes.has(q.type)&&activeTopics.has(q.topic)).length;
  document.getElementById('q-count').textContent=n;
}

function toggleType(type,btn){
  if(activeTypes.has(type)){
    if(activeTypes.size===1) return;
    activeTypes.delete(type);
    btn.classList.remove('active','active-green');
  } else {
    activeTypes.add(type);
    btn.classList.add(type==='real'?'active':'active-green');
  }
  updateCount();
}

function toggleTopic(topic,btn){
  if(activeTopics.has(topic)){
    if(activeTopics.size===1) return;
    activeTopics.delete(topic);
    btn.classList.remove('active');
    btn.style.opacity='0.4';
  } else {
    activeTopics.add(topic);
    btn.classList.add('active');
    btn.style.opacity='1';
  }
  updateCount();
}

function shuffle(a){return [...a].sort(()=>Math.random()-0.5);}

function startQuiz(){
  filtered=shuffle(Q.filter(q=>activeTypes.has(q.type)&&activeTopics.has(q.topic)));
  current=0; score=0; wrongTopics={};
  document.getElementById('start-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  load();
}

function load(){
  answered=false;
  const q=filtered[current];
  document.getElementById('progress-fill').style.width=(current/filtered.length*100)+'%';
  document.getElementById('progress-text').textContent=`Spørsmål ${current+1} av ${filtered.length}`;
  document.getElementById('score-text').textContent=`${score} riktige`;
  const tt=document.getElementById('tag-type');
  if(q.type==='real'){tt.textContent='Ekte tentamen';tt.className='tag tag-real';}
  else{tt.textContent='Øvingsoppgave';tt.className='tag tag-own';}
  document.getElementById('tag-topic').textContent=q.topic;
  document.getElementById('question').textContent=q.q;
  const od=document.getElementById('options');
  od.innerHTML='';
  q.o.forEach((opt,i)=>{
    const b=document.createElement('button');
    b.className='option'; b.textContent=opt;
    b.onclick=()=>answer(i);
    od.appendChild(b);
  });
  document.getElementById('feedback').className='feedback';
  document.getElementById('feedback').innerHTML='';
  document.getElementById('next-btn').className='next-btn';
}

function answer(i){
  if(answered) return;
  answered=true;
  const q=filtered[current];
  const opts=document.querySelectorAll('.option');
  opts.forEach(b=>b.disabled=true);
  opts[q.c].classList.add('correct');
  const fb=document.getElementById('feedback');
  if(i===q.c){
    score++;
    opts[i].classList.add('correct');
    fb.className='feedback ok show';
    fb.innerHTML=`<strong>✅ Riktig!</strong><div class="sol"><div class="sol-title">📖 Forklaring:</div>${q.s}</div>`;
  } else {
    opts[i].classList.add('wrong');
    fb.className='feedback no show';
    fb.innerHTML=`<strong>❌ Feil — riktig svar: ${String.fromCharCode(65+q.c)}</strong><div class="sol"><div class="sol-title">📖 Slik løser du det:</div>${q.s}</div>`;
    wrongTopics[q.topic]=(wrongTopics[q.topic]||0)+1;
  }
  document.getElementById('score-text').textContent=`${score} riktige`;
  const nb=document.getElementById('next-btn');
  nb.className='next-btn show';
  nb.textContent=current+1<filtered.length?'Neste spørsmål →':'Se resultater →';
}

document.getElementById('next-btn').onclick=()=>{
  current++;
  if(current<filtered.length) load();
  else showResults();
};

function showResults(){
  document.getElementById('quiz-screen').style.display='none';
  const rs=document.getElementById('results-screen');
  rs.classList.add('show');
  const pct=Math.round(score/filtered.length*100);
  document.getElementById('score-display').textContent=pct+'%';
  let title,msg;
  if(pct>=85){title='🔥 Imponerende!';msg=`${score} av ${filtered.length} riktige. Du er godt forberedt!`;}
  else if(pct>=65){title='👍 Bra jobbet!';msg=`${score} av ${filtered.length} riktige. Litt mer øving på svake temaer.`;}
  else{title='📚 Mer øving trengs';msg=`${score} av ${filtered.length} riktige. Fokuser på temaene nedenfor.`;}
  document.getElementById('results-title').textContent=title;
  document.getElementById('results-msg').textContent=msg;
  const sorted=Object.entries(wrongTopics).sort((a,b)=>b[1]-a[1]);
  if(sorted.length>0){
    document.getElementById('weak-box').style.display='block';
    const list=document.getElementById('weak-list');
    list.innerHTML='';
    sorted.forEach(([t,n])=>{
      const li=document.createElement('li');
      li.textContent=`⚠️ ${t} — ${n} feil`;
      list.appendChild(li);
    });
  }
}

function restartSame(){
  filtered=shuffle(filtered);
  current=0; score=0; wrongTopics={};
  document.getElementById('results-screen').classList.remove('show');
  document.getElementById('quiz-screen').style.display='block';
  load();
}
function backToStart(){
  document.getElementById('results-screen').classList.remove('show');
  document.getElementById('start-screen').style.display='block';
}
</script>
